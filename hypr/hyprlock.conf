# GENERAL
general {
  no_fade_in = false
  grace = 1
  disable_loading_bar = false
  hide_cursor = true
  ignore_empty_input = true
  text_trim = true
}

# BACKGROUND
background {
    monitor =
    path = ~/dotfiles/.cache/current_wallpaper
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME HR
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = rgba(255, 255, 255, 1)
    shadow_pass = 2
    shadow_size = 3
    shadow_color = rgb(0,0,0)
    shadow_boost = 1.2
    font_size = 180
    font_family = AlfaSlabOne
    position = 0, -180
    halign = center
    valign = top
}

# TIME MIN
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgba(255, 255, 255, 1)
    shadow_pass = 2
    shadow_size = 3
    shadow_color = rgb(0,0,0)
    shadow_boost = 1.2
    font_size = 180
    font_family = AlfaSlabOne
    position = 0, -370
    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%d %b %A")"
    color = rgba(255, 255, 255, 0.6)
    font_size = 14
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -700
    halign = center
    valign = top
}

# INPUT FIELD BACKGROUND
shape {
    monitor =
    size = 300, 70
    color = rgba(0, 0, 0, 0.7)
    rounding = 999
    border_size = 0
    position = 0, 65
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 70
    outline_thickness = 0
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)
    dots_size = 0.25
    dots_spacing = 0.5
    dots_center = true
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font Mono
    placeholder_text = <span foreground="##ffffff66"> $USER</span>
    hide_input = false
    rounding = 999
    position = 0, 65
    halign = center
    valign = bottom
    zindex = 10
}

# INFO (Battery etc.)
label {
    monitor =
    text = cmd[update:5000] echo "$(~/dotfiles/hypr/scripts/infolock.sh)"
    color = rgba(255, 255, 255, 0.5)
    font_size = 14
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = -35, 30
    halign = right
    valign = bottom
}