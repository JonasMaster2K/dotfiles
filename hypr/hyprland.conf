# ── Autostart ─────────────────────────────────────────────
exec-once = hyprpaper
exec-once = hypridle
exec-once = swayosd-server
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dunst

# Audio
exec-once = easyeffects --hide-window --service-mode

# Clipboard: history
# exec-once = wl-paste --watch cliphist store &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

env = QT_STYLE_OVERRIDE,kvantum

# ── Definitions ───────────────────────────────────────────
$terminal = kitty
$browser = zen-browser
$explorer = dolphin
$menu = wofi --show drun

# ── Monitor ───────────────────────────────────────────────
monitor=,preferred,auto,1.0

# ── General ───────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 5
    gaps_workspaces = 50

    border_size = 1
    col.active_border = rgba(0DB7D455)
    col.inactive_border = rgba(31313600)
    resize_on_border = true

    no_focus_fallback = true

    allow_tearing = true

    snap {
        enabled = true
        window_gap = 4
        monitor_gap = 5
        respect_gaps = true
    }

    layout = dwindle
}

cursor {
    zoom_factor = 1
    zoom_rigid = false
    zoom_disable_aa = true
    hotspot_padding = 1
}

# ── Laptop ────────────────────────────────────────────────
dwindle {
    pseudotitle = true
    preserve_split = true
    smart_split = false
    smart_resizing = false
}

binds {
    workspace_back_and_forth = false
    allow_workspace_cycles = true
    pass_mouse_when_bound = false
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
}

gesture = 3, horizontal, workspace
gesture = 3, down, mod: ALT, close
gesture = 3, pinch, float
gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen
gesture = 3, left, scale: 1.5, float
gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# ── Misc ──────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgba(1D1011FF)
    initial_workspace_tracking = false
    force_default_wallpaper = 1
    vfr = 1
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Allacritty)
    new_window_takes_over_fullscreen = 2
    allow_session_lock_restore = true
    session_lock_xray = true
    focus_on_activate = true
}

# ── Decoration ────────────────────────────────────────────
decoration {
    rounding_power = 2
    rounding = 18

    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 10
        passes = 3
        brightness = 1
        noise = 0.05
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 50
        offset = 0 4
        render_power = 10
        color = rgba(00000027)
    }

    # Dim
    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.2
}

# ── Animations ────────────────────────────────────────────
animations {
    enabled = true
    # Curves
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85
    # Configs
    # windows
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel
    # layers
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%
    # fade
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall
    # workspaces
    animation = workspaces, 1, 7, menu_decel, slide
    ## specialWorkspace
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
    # zoom
    animation = zoomFactor, 1, 3, standardDecel
}

# ── Input ─────────────────────────────────────────────────
input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35
    follow_mouse = 1
    off_window_axis_events = 2
    mouse_refocus =  false
    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
        scroll_factor = 0.7
        disable_while_typing = true
        tap-to-click = true
    }
    sensitivity = 0
}

# ── Modifier ──────────────────────────────────────────────
$mod = SUPER

# ── Apps ──────────────────────────────────────────────────
bind = $mod, T, exec, $terminal
bind = $mod, R, exec, $menu
bind = $mod, E, exec, $explorer
bind = $mod, B, exec, $browser

# ── Window Management ─────────────────────────────────────
bind = ALT, F4, killactive
bind = $mod, Q, killactive
bind = $mod, ESC, exit
bind = $mod, F, fullscreen, 1
bind = $mod, D, fullscreen, 0
bind = $mod, P, pin
bind = $mod, V, togglefloating
bind = $mod, J, togglesplit
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:274, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod, Comma, splitratio, -0.1
bind = $mod, Period, splitratio, +0.1

# ── Workspaces ────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ── Fn-Keys ───────────────────────────────────────────────
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ── Screenshot ────────────────────────────────────────────
bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%F_%T).png

# ── Laptop Lid ────────────────────────────────────────────
bindl = , switch:Lid Switch, exec, hyprctl dispatch dpms off

# ── Window rules ──────────────────────────────────────────
windowrule = float, title:^(pavucontrol)$
windowrule = float, title:^(blueman-manager)$
windowrule = float, title:^(nm-connection-editor)$
windowrule = float, title:^(qalculate-gtk)$

windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin, title:^(Picture-in-Picture)$
windowrule = move 69.5% 4%, title:^(Picture-in-Picture)$

windowrule = idleinhibit fullscreen, class:([window])

windowrule = noblur, class:^(\bresolve\b)$, wayland:1

windowrule = suppressevent maximize, class:,*

windowrule = nofocus, class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

windowrule = opacity 0.8, class:^(.*)
windowrule = decorate true, class:^(.*)
