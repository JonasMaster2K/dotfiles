# ── Window rules ──────────────────────────────────────────

# Suppress maximize/minimize events globally
windowrule = suppress_event maximize, match:class .*
# Fix XWayland dragging issues
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# ── Tags ──────────────────────────────────────────────────

windowrule = tag +default-opacity, match:class .*

# Terminal
windowrule = tag +terminal, match:class (kitty|Alacritty|com.mitchellh.ghostty)

# Browser
windowrule = tag +chromium-based-browser, match:class ((google-)?[cC]hrom(e|ium)|[bB]rave-browser|[mM]icrosoft-edge|Vivaldi-stable|helium)
windowrule = tag +firefox-based-browser, match:class ([fF]irefox|zen|librewolf)
windowrule = tag -chromium-based-browser, match:class (chrome-youtube.com__-Default|chrome-app.zoom.us__wc_home-Default)

# No opacity
windowrule = tag +no-opacity, match:tag chromium-based-browser
windowrule = tag +no-opacity, match:tag firefox-based-browser
windowrule = tag +no-opacity, match:class (chrome-youtube.com__-Default|chrome-app.zoom.us__wc_home-Default)
windowrule = tag +no-opacity, match:class ^(zoom|vlc|mpv|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|org.inkscape.Inkscape|gimp|krita)$
windowrule = tag -default-opacity, match:tag no-opacity
windowrule = tag -default-opacity, match:tag terminal

# Floating
windowrule = tag +float-center, match:class (Share|localsend|org.gnome.Calculator|io.github.JonasMaster2K.dotfiles.installer)
windowrule = tag +float-center, match:title ^(Export Image as PNG|Preferences|Open Folder)
windowrule = tag +floating-window, match:class (xdg-desktop-portal-gtk|sublime_text|DesktopEditors|thunar), match:title ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)
windowrule = tag +floating-window, match:class ^(Bitwarden)$

# Misc
windowrule = tag +noidle, match:tag noidle
windowrule = tag +pop, match:tag pop

# ── Opacity ───────────────────────────────────────────────

windowrule = opacity 0.9 0.8, match:tag default-opacity
windowrule = opacity 0.9 0.8, match:tag terminal
windowrule = opacity 1.0 0.97, match:tag chromium-based-browser
windowrule = opacity 1.0 0.97, match:tag firefox-based-browser
windowrule = opacity 1.0 1.0, match:tag no-opacity

# ── Floating & Layout ─────────────────────────────────────

windowrule = float on, match:tag float-center
windowrule = center on, match:tag float-center
windowrule = float on, match:tag floating-window
windowrule = center on, match:tag floating-window
windowrule = tile on, match:tag chromium-based-browser

# Sizes
windowrule = size 1100 700, match:class localsend
windowrule = size 800 600, match:title ^(Preferences)
windowrule = size 800 600, match:title ^(Open Folder)
windowrule = size 875 600, match:tag floating-window

# ── Special Workspaces ────────────────────────────────────

windowrule = workspace special:spotify silent, match:class [Ss]potify

# ── Misc ──────────────────────────────────────────────────

windowrule = rounding 8, match:tag pop
windowrule = idle_inhibit always, match:tag noidle
windowrule = no_screen_share on, match:class ^(Bitwarden)$