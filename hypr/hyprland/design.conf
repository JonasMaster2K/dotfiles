# ── General ───────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 5

    border_size = 2
    col.active_border = rgba(0DB7D4CC)
    col.inactive_border = rgba(31313666)
    resize_on_border = false

    no_focus_fallback = true

    allow_tearing = false

    snap {
        enabled = true
        window_gap = 4
        monitor_gap = 5
        respect_gaps = true
    }

    layout = dwindle
}

# ── Cursor ────────────────────────────────────────────────
cursor {
    zoom_factor = 1
    zoom_rigid = false
    zoom_disable_aa = true
    hotspot_padding = 1
    hide_on_key_press = true
    warp_on_change_workspace = 1
    no_hardware_cursors = true
}

# ── Dwindle ───────────────────────────────────────────────
dwindle {
    preserve_split = true
    split_bias = 1
    smart_split = true
}

# ── Master ────────────────────────────────────────────────
master {
    new_status = master
}

# ── Decoration ────────────────────────────────────────────
decoration {
    rounding_power = 2
    rounding = 18

    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 2
        passes = 2
        brightness = 0.6
        noise = 0.05
        contrast = 0.75
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 50
        offset = 0 4
        render_power = 10
        color = rgba(00000027)
    }

    # Dim
    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.2
}

# ── Groups ────────────────────────────────────────────────
group {
    col.border_active = rgba(0DB7D4CC)
    col.border_inactive = rgba(31313666)
    col.border_locked_active = -1
    col.border_locked_inactive = -1

    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal

        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0

        text_color = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active = rgba(00000040)
        col.inactive = rgba(00000020)

        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}

# ── Animations ────────────────────────────────────────────
animations {
    enabled = true

    # Curves
    bezier = expressiveFastSpatial,    0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial,    0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel,          0.05, 0.7,  0.1,  1
    bezier = emphasizedAccel,          0.3,  0,    0.8,  0.15
    bezier = standardDecel,            0,    0,    0,    1
    bezier = menu_decel,               0.1,  1,    0,    1
    bezier = menu_accel,               0.52, 0.03, 0.72, 0.08
    bezier = stall,                    1,   -0.1,  0.7,  0.85

    animation = global,        1, 10, default
    animation = border,        1, 5,  emphasizedDecel
    animation = windows,       1, 4,  emphasizedDecel
    animation = windowsIn,     1, 4,  emphasizedDecel,  popin 87%
    animation = windowsOut,    1, 2,  emphasizedAccel,  popin 87%
    animation = fadeIn,        1, 2,  emphasizedDecel
    animation = fadeOut,       1, 2,  emphasizedDecel
    animation = fade,          1, 3,  menu_decel
    animation = layers,        1, 4,  emphasizedDecel
    animation = layersIn,      1, 4,  emphasizedDecel,  fade
    animation = layersOut,     1, 2,  menu_accel,       fade
    animation = fadeLayersIn,  1, 2,  menu_decel
    animation = fadeLayersOut, 1, 2,  stall
    animation = workspaces,    0, 0,  menu_decel
    animation = specialWorkspaceIn,  1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
    animation = zoomFactor,    1, 3,  standardDecel
}

# ── Misc ──────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgba(1D1011FF)
    initial_workspace_tracking = false
    force_default_wallpaper = 1
    vfr = 1
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Allacritty)
    allow_session_lock_restore = true
    session_lock_xray = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1
}