# ── Definitions ───────────────────────────────────────────
$mod            = SUPER
$terminal       = kitty
$browser        = zen-browser
$explorer       = thunar
$launcher       = wofi --show drun
$editor         = codium
$notes          = obsidian
$mail           = thunderbird
$musicplayer    = spotify
$lockscreen     = hyprlock

# ── Apps ──────────────────────────────────────────────────
bindd = $mod, T,        Launch terminal,    exec, $terminal
bindd = $mod, B,        Launch browser,     exec, $browser
bindd = $mod, E,        Launch explorer,    exec, $explorer
bindd = $mod, SPACE,    Launch launcher,    exec, $launcher
bindd = $mod, C,        Launch editor,      exec, $editor
bindd = $mod, N,        Launch notes,       exec, $notes
bindd = $mod, I,        Launch email,       exec, $mail
bindd = $mod SHIFT, M,  Launch musicplayer, exec, pgrep -x $musicplayer || $musicplayer
bindd = $mod, L,        Lock screen,        exec, $lockscreen

# ── Special Workspaces ────────────────────────────────────
bindd = $mod,       S,   Toggle scratchpad,             togglespecialworkspace, scratchpad
bindd = $mod CTRL,  S,   Move to scratchpad (silent),   movetoworkspacesilent, special:scratchpad
bindd = $mod,       M,   Toggle Spotify,                togglespecialworkspace, spotify

# ── Window Management ─────────────────────────────────────
bind  = ALT,        F4, killactive
bind  = $mod,       Q,  killactive
bindd = $mod,       F,  Fullscreen,         fullscreen, 0
bindd = $mod,       D,  Maximize,           fullscreen, 1
bindd = $mod,       P,  Pin window,         pin
bindd = $mod SHIFT, V,  Toggle floating,    togglefloating
bindd = $mod,       J,  Toggle split,       togglesplit

# Move focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Swap windows
bind = $mod SHIFT, left,  swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up,    swapwindow, u
bind = $mod SHIFT, down,  swapwindow, d

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Resize with keyboard
binde = $mod, Comma,      resizeactive, -20 0
binde = $mod, Period,     resizeactive,  20 0
binde = $mod, Numbersign, resizeactive,  0  20
binde = $mod, Plus,       resizeactive,  0 -20

# Cycle windows
bind = ALT,       TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev

# Workspace scroll
bind = $mod,       mouse_down, workspace, e+1
bind = $mod,       mouse_up,   workspace, e-1
bind = $mod,       TAB,        workspace, e+1
bind = $mod SHIFT, TAB,        workspace, e-1
bind = $mod CTRL,  TAB,        workspace, previous

# Move workspace to monitor
bind = $mod SHIFT ALT, left,  movecurrentworkspacetomonitor, l
bind = $mod SHIFT ALT, right, movecurrentworkspacetomonitor, r
bind = $mod SHIFT ALT, up,    movecurrentworkspacetomonitor, u
bind = $mod SHIFT ALT, down,  movecurrentworkspacetomonitor, d

# ── Groups ────────────────────────────────────────────────
bindd = $mod,           G,          Toggle grouping,          togglegroup
bindd = $mod ALT,       G,          Move out of group,        moveoutofgroup
bindd = $mod ALT,       LEFT,       Move into group left,     moveintogroup, l
bindd = $mod ALT,       RIGHT,      Move into group right,    moveintogroup, r
bindd = $mod ALT,       UP,         Move into group up,       moveintogroup, u
bindd = $mod ALT,       DOWN,       Move into group down,     moveintogroup, d
bindd = $mod ALT,       TAB,        Next in group,            changegroupactive, f
bindd = $mod ALT SHIFT, TAB,        Prev in group,            changegroupactive, b
bindd = $mod CTRL,      LEFT,       Group focus left,         changegroupactive, b
bindd = $mod CTRL,      RIGHT,      Group focus right,        changegroupactive, f
bindd = $mod ALT,       mouse_down, Next in group,            changegroupactive, f
bindd = $mod ALT,       mouse_up,   Prev in group,            changegroupactive, b
bindd = $mod ALT,       code:10,    Switch to group window 1, changegroupactive, 1
bindd = $mod ALT,       code:11,    Switch to group window 2, changegroupactive, 2
bindd = $mod ALT,       code:12,    Switch to group window 3, changegroupactive, 3
bindd = $mod ALT,       code:13,    Switch to group window 4, changegroupactive, 4
bindd = $mod ALT,       code:14,    Switch to group window 5, changegroupactive, 5

# ── Workspaces ────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod SHIFT ALT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT ALT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT ALT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT ALT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT ALT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT ALT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT ALT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT ALT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT ALT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT ALT, 0, movetoworkspacesilent, 10

# ── Fn-Keys ───────────────────────────────────────────────
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

# Volume
bindeld = , XF86AudioRaiseVolume,  Volume up,           exec, $osdclient --output-volume raise
bindeld = , XF86AudioLowerVolume,  Volume down,         exec, $osdclient --output-volume lower
bindeld = , XF86AudioMute,         Mute,                exec, $osdclient --output-volume mute-toggle
bindeld = , XF86AudioMicMute,      Mute microphone,     exec, $osdclient --input-volume mute-toggle
# Precise 1% volume
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise,   exec, $osdclient --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise,  exec, $osdclient --output-volume -1

# Brightness
bindeld = , XF86MonBrightnessUp,   Brightness up,       exec, $osdclient --brightness raise
bindeld = , XF86MonBrightnessDown, Brightness down,     exec, $osdclient --brightness lower
# Precise 1% brightness
bindeld = ALT, XF86MonBrightnessUp,   Brightness up precise,   exec, $osdclient --brightness +1
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise,  exec, $osdclient --brightness -1

# Keyboard brightness (auskommentiert - braucht brightnessctl o.ä.)
# bindeld = , XF86KbdBrightnessUp,    Keyboard brightness up,    exec, brightnessctl -d *kbd_backlight* set +10%
# bindeld = , XF86KbdBrightnessDown,  Keyboard brightness down,  exec, brightnessctl -d *kbd_backlight* set 10%-
# bindld  = , XF86KbdLightOnOff,      Keyboard backlight toggle, exec, brightnessctl -d *kbd_backlight* set 0

# Media keys
bindld = , XF86AudioPlay,  Play/Pause,     exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPause, Pause,          exec, $osdclient --playerctl play-pause
bindld = , XF86AudioNext,  Next track,     exec, $osdclient --playerctl next
bindld = , XF86AudioPrev,  Previous track, exec, $osdclient --playerctl previous
# bindld = , XF86AudioStop, Stop, exec, playerctl stop

# Display
# bindld = , XF86Display,       Display switch,   exec, wdisplays
# bindld = , XF86RotateWindows, Rotate display,   exec, hyprctl keyword monitor ,transform,1

# Misc
# bindld = , XF86WebCam,     Toggle webcam,  exec, cheese
# bindld = , XF86WLAN,       Toggle wifi,    exec, nmcli radio wifi toggle
# bindld = , XF86Bluetooth,  Toggle BT,      exec, bluetoothctl power toggle
# bindld = , XF86Sleep,      Sleep,          exec, systemctl suspend
# bindld = , XF86PowerOff,   Shutdown,       exec, systemctl poweroff

# ── Screenshot ────────────────────────────────────────────
bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%F_%T).png

# ── Laptop Lid ────────────────────────────────────────────
bindl = , switch:Lid Switch, exec, hyprctl dispatch dpms off